<div class="card h-100 shadow-sm border-0 product-card">
  <a [routerLink]="['/products', product.id]">
    <img [src]="product.image" [alt]="product.name"
      class="card-img-top product-img" loading="lazy">
  </a>
  <div class="card-body d-flex flex-column">
    <span class="badge bg-secondary mb-2 align-self-start">{{ product.category }}</span>
    <h6 class="card-title fw-semibold">{{ product.name }}</h6>
    <p class="card-text text-muted small flex-grow-1">{{ product.description | slice:0:80 }}...</p>
    <div class="d-flex justify-content-between align-items-center mt-2">
      <span class="fw-bold text-primary fs-5">{{ product.price | currencyFormat }}</span>
      <span class="small text-warning">{{ product.rating }} estrellas</span>
    </div>
  </div>
  <div class="card-footer bg-transparent border-0 pb-3 px-3">
    <button class="btn btn-dark w-100 btn-sm" (click)="onAddToCart()"
      [disabled]="product.stock === 0">
      {{ product.stock === 0 ? 'Sin stock' : 'Agregar al carrito' }}
    </button>
  </div>
</div>
