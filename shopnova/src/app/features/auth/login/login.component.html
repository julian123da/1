<div class="min-vh-100 d-flex align-items-center bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card shadow border-0 rounded-4 p-4">
          <h4 class="fw-bold mb-1">Bienvenido</h4>
          <p class="text-muted small mb-4">Ingresa a tu cuenta de ShopNova</p>

          @if (error) {
            <div class="alert alert-danger py-2 small">{{ error }}</div>
          }

          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" formControlName="email"
                placeholder="tu@email.com">
              @if (form.get('email')?.invalid && form.get('email')?.touched) {
                <div class="text-danger small mt-1">Email invalido.</div>
              }
            </div>
            <div class="mb-4">
              <label class="form-label">Contrasena</label>
              <input class="form-control" type="password" formControlName="password"
                placeholder="******">
              @if (form.get('password')?.invalid && form.get('password')?.touched) {
                <div class="text-danger small mt-1">Minimo 6 caracteres.</div>
              }
            </div>
            <button class="btn btn-dark w-100" type="submit"
              [disabled]="form.invalid">
              Ingresar
            </button>
          </form>

          <p class="text-center small mt-3 mb-0">
            No tienes cuenta?
            <a routerLink="/auth/register" class="text-decoration-none">Registrate</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
