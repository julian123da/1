<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">Gestion de productos</h2>
  </div>

  <input class="form-control mb-4 w-50" placeholder="Buscar..."
    [value]="search()"
    (input)="search.set($any($event.target).value)">

  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>Producto</th>
          <th>Categoria</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Rating</th>
        </tr>
      </thead>
      <tbody>
        @for (p of filtered(); track p.id) {
          <tr>
            <td>
              <div class="d-flex align-items-center gap-2">
                <img [src]="p.image" style="width:40px;height:40px;object-fit:cover" class="rounded-2">
                <span class="fw-semibold">{{ p.name }}</span>
              </div>
            </td>
            <td><span class="badge bg-secondary">{{ p.category }}</span></td>
            <td>{{ p.price | currencyFormat }}</td>
            <td>
              @if (p.stock === 0) {
                <span class="badge bg-danger">Sin stock</span>
              } @else {
                <span class="badge bg-success">{{ p.stock }}</span>
              }
            </td>
            <td>{{ p.rating }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
