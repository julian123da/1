<div class="container py-5">
  <h2 class="fw-bold mb-4">Panel de administracion</h2>

  <div class="row g-4 mb-5">
    <div class="col-md-4">
      <div class="card border-0 bg-dark text-white shadow-sm p-4 rounded-4">
        <div class="small text-secondary mb-1">Total productos</div>
        <div class="fs-2 fw-bold">{{ totalProducts() }}</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 bg-danger text-white shadow-sm p-4 rounded-4">
        <div class="small mb-1">Sin stock</div>
        <div class="fs-2 fw-bold">{{ outOfStock() }}</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 bg-primary text-white shadow-sm p-4 rounded-4">
        <div class="small mb-1">Precio promedio</div>
        <div class="fs-2 fw-bold">{{ avgPrice() | currencyFormat }}</div>
      </div>
    </div>
  </div>

  <a routerLink="/admin/products" class="btn btn-outline-dark">
    Gestionar productos
  </a>
</div>
