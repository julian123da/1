<section class="hero bg-dark text-white py-5">
  <div class="container py-4">
    <div class="row align-items-center">
      <div class="col-lg-6">
        <h1 class="display-5 fw-bold mb-3">Descubre lo mejor en ShopNova</h1>
        <p class="lead text-secondary mb-4">
          Productos de calidad, entregas rapidas y la mejor experiencia de compra.
        </p>
        <a routerLink="/products" class="btn btn-primary btn-lg px-5">
          Ver productos
        </a>
      </div>
    </div>
  </div>
</section>

<section class="py-5">
  <div class="container">
    <h2 class="fw-bold mb-4">Productos destacados</h2>
    <div class="row g-4">
      @for (product of featured(); track product.id) {
        <div class="col-sm-6 col-lg-3">
          <app-product-card [product]="product" />
        </div>
      }
    </div>
    <div class="text-center mt-5">
      <a routerLink="/products" class="btn btn-outline-dark px-5">
        Ver todos los productos
      </a>
    </div>
  </div>
</section>
